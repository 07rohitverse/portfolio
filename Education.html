<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
width:90%;
max-width:700px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
margin-bottom:20px;
font-size:36px;
}

p{
margin:8px 0;
font-size:18px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:rgba(255,255,255,0.1);
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

th{
background:#ff4b2b;
}

tr:hover{
background:rgba(255,255,255,0.2);
}

caption{
margin-bottom:10px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Education</h1>

<p>Class 10th = 82.5%</p>
<p>Class 12th = 78%</p>
<p>ADCA = 86%</p>
<p>CCC = C Grade</p>
<p>NCC = B Grade</p>

<table>

<caption>My Academic Data</caption>

<thead>
<tr>
<th>Class</th>
<th>Roll No</th>
<th>Total Marks</th>
<th>My Score</th>
</tr>
</thead>

<tbody>
<tr>
<td>10th</td>
<td>1232336688</td>
<td>600</td>
<td>495</td>
</tr>

<tr>
<td>12th</td>
<td>2256961401</td>
<td>500</td>
<td>390</td>
</tr>
</tbody>

</table>

</div>

</body>
</html>
